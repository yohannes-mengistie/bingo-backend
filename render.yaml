# Render Blueprint — deploys the whole backend (Go API + Postgres + Redis) on
# Render's free plan. Create it from the Render dashboard: New → Blueprint →
# connect this repo. Render reads this file and provisions all three services,
# auto-wiring the DB/Redis connection env vars.
#
# After the first deploy you must (one time):
#   1. Load the schema into Postgres: run migrations/init.sql against the
#      database's External Connection String (see chat / RENDER_MIGRATIONS.md).
#   2. Fill in the SECRET_CODE and TELEGRAM_BOT_TOKEN values you're prompted for.
#
# NOTE: Render's *free* Postgres is deleted ~30 days after creation. Fine for
# testing; move to a durable DB (e.g. Neon) before going live for real.

databases:
  - name: bingo-db
    plan: free
    databaseName: bingo
    user: bingo

services:
  # Redis (Render "Key Value"). Empty ipAllowList = reachable only from other
  # services in this Render account (internal network), not the public internet.
  - name: bingo-redis
    type: keyvalue
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

  # Go API, built from the existing Dockerfile.
  - name: bingo-api
    type: web
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      # Render injects PORT automatically and the app reads it; do not set it.
      - key: SERVER_HOST
        value: 0.0.0.0

      # ---- Postgres (auto-wired from the bingo-db database above) ----
      - key: DB_HOST
        fromDatabase:
          name: bingo-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: bingo-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: bingo-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: bingo-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: bingo-db
          property: database
      - key: DB_SSLMODE
        value: require

      # ---- Redis (auto-wired from the bingo-redis instance above) ----
      - key: REDIS_URL
        fromService:
          name: bingo-redis
          type: keyvalue
          property: connectionString

      # ---- Auth ----
      - key: JWT_SECRET            # randomly generated by Render, never shown in git
        generateValue: true
      - key: JWT_EXPIRATION_HOURS
        value: "24"
      - key: SECRET_CODE           # prompted on first Blueprint create (gates /auth/create-admin)
        sync: false

      # ---- Telegram ---- (prompted on first create; can be left blank for now
      # and filled in later once you create the bot in @BotFather)
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      # Shared secret echoed back by Telegram in the webhook header; must match
      # the secret_token passed to setWebhook. Set in the dashboard.
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      # URL the bot's "Play" button opens. Defaults in code to the Vercel app;
      # override here if the frontend moves to another host.
      - key: TELEGRAM_MINIAPP_URL
        value: https://bingo-miniapp-gold.vercel.app

      # ---- Payment verifier (verify.leul.et) ----
      # When VERIFY_API_KEY is set, deposits are auto-verified against the
      # external receipt verifier and credited instantly; leave it blank to keep
      # the manual admin-approval flow. Set the key/suffix in the dashboard.
      - key: VERIFY_API_KEY        # your key from verify.leul.et — secret
        sync: false
      - key: VERIFY_CBE_SUFFIX     # last 8 digits of YOUR receiving CBE account
        sync: false
      - key: VERIFY_API_BASE_URL
        value: https://verifyapi.leulzenebe.pro
